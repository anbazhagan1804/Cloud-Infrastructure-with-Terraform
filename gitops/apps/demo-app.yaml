apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-platform
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/anbazhagan1804/Cloud-Infrastructure-with-Terraform.git
    targetRevision: HEAD
    path: gitops/workloads/demo/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
